<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptForge Exhibition • Best Prompt Wins</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .gallery-card { transition: all 0.3s; }
    .gallery-card:hover { transform: scale(1.03); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-6xl mx-auto p-6">
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-robot text-4xl text-cyan-400"></i>
        <h1 class="text-3xl font-bold tracking-tighter">PromptForge</h1>
      </div>
      <div class="text-cyan-400 font-medium">AI Prompt Exhibition • Booth Edition</div>
    </div>

    <!-- Hero + Target -->
    <div class="bg-zinc-900 rounded-3xl p-8 mb-12 border border-zinc-800">
      <h2 class="text-5xl font-bold text-center mb-4">Who can write the BEST prompt?</h2>
      <p class="text-center text-xl text-zinc-400 mb-8">Try to generate the image that matches the target as closely as possible!</p>
      
      <div class="max-w-md mx-auto">
        <p class="text-sm uppercase tracking-widest text-cyan-400 mb-2 text-center">TARGET IMAGE</p>
        <img id="targetImage" src="https://picsum.photos/id/1015/800/800" 
             class="w-full rounded-2xl shadow-2xl border-4 border-cyan-400" alt="Target AI Image">
        <p class="text-center text-zinc-400 mt-4 text-sm">Can you get closer than this?</p>
      </div>
    </div>

    <!-- Submit Form -->
    <div class="bg-zinc-900 rounded-3xl p-8 mb-12">
      <h3 class="text-2xl font-semibold mb-6 flex items-center gap-2">
        <i class="fa-solid fa-pen-to-square"></i> Submit Your Prompt
      </h3>
      
      <div class="grid md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm mb-2">Your Nickname </label>
          <input id="nickname" type="text" placeholder="e.g. Minwoo" 
                 class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-lg focus:outline-none focus:border-cyan-400">
        </div>
        <div>
          <label class="block text-sm mb-2">Your Prompt</label>
          <textarea id="prompt" rows="4" placeholder="..."
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-lg focus:outline-none focus:border-cyan-400 resize-none"></textarea>
        </div>
      </div>

      <button onclick="generateImage()" 
              class="mt-6 w-full bg-gradient-to-r from-cyan-400 to-purple-500 hover:from-cyan-500 hover:to-purple-600 text-black font-bold text-xl py-5 rounded-2xl flex items-center justify-center gap-3 transition-all">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        GENERATE & SUBMIT
      </button>
      <p id="status" class="text-center mt-4 text-sm text-zinc-400"></p>
    </div>

    <!-- Live Gallery -->
    <h3 class="text-2xl font-semibold mb-6 flex items-center gap-2">
      <i class="fa-solid fa-fire"></i> Live Gallery – Best Prompts So Far
    </h3>
    <div id="gallery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </div>

  <script>
    // ================== CONFIG ==================
    const REPLICATE_API_TOKEN = "r8_IYpIICUU2FAY6xNrHTCWKsuNgnM5LUV0nhWPp";   // ← Change this!
    const MODEL_VERSION = "black-forest-labs/flux-schnell";   // Fast & high quality in 2026
    
    let submissions = JSON.parse(localStorage.getItem('promptforge_submissions')) || [];

    function renderGallery() {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';
      submissions.forEach(sub => {
        const card = document.createElement('div');
        card.className = 'gallery-card bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden';
        card.innerHTML = `
          <div class="aspect-square bg-black relative">
            <img src="${sub.imageUrl}" class="w-full h-full object-cover">
          </div>
          <div class="p-5">
            <p class="font-medium">${sub.nickname}</p>
            <p class="text-sm text-zinc-400 line-clamp-3 mt-1">${sub.prompt}</p>
            <p class="text-xs text-cyan-400 mt-3">${new Date(sub.timestamp).toLocaleTimeString()}</p>
          </div>
        `;
        gallery.appendChild(card);
      });
    }

    async function generateImage() {
      const nickname = document.getElementById('nickname').value.trim() || "Anonymous";
      const prompt = document.getElementById('prompt').value.trim();
      const status = document.getElementById('status');

      if (!prompt) {
        status.textContent = "Please write a prompt!";
        return;
      }

      status.innerHTML = `Generating image with <span class="text-cyan-400">Flux Schnell</span>… <i class="fa-solid fa-spinner fa-spin"></i>`;

      try {
        const response = await fetch("https://api.replicate.com/v1/predictions", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${REPLICATE_API_TOKEN}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            version: MODEL_VERSION,
            input: {
              prompt: prompt,
              num_outputs: 1,
              aspect_ratio: "1:1",
              output_format: "webp"
            }
          })
        });

        const prediction = await response.json();
        
        // Poll for result (Replicate is async)
        let result = await checkPrediction(prediction.id);
        
        const newSubmission = {
          nickname,
          prompt,
          imageUrl: result.output[0],
          timestamp: Date.now()
        };

        submissions.unshift(newSubmission);
        localStorage.setItem('promptforge_submissions', JSON.stringify(submissions));
        
        renderGallery();
        
        // Clear form
        document.getElementById('prompt').value = '';
        status.innerHTML = `<span class="text-green-400">✅ Image generated and added to gallery!</span>`;
        
      } catch (err) {
        status.innerHTML = `<span class="text-red-400">Error. Check your Replicate token.</span>`;
        console.error(err);
      }
    }

    async function checkPrediction(id) {
      let attempts = 0;
      while (attempts < 30) {
        const res = await fetch(`https://api.replicate.com/v1/predictions/${id}`, {
          headers: { "Authorization": `Bearer ${REPLICATE_API_TOKEN}` }
        });
        const data = await res.json();
        if (data.status === "succeeded") return data;
        if (data.status === "failed") throw new Error("Generation failed");
        await new Promise(r => setTimeout(r, 1000));
        attempts++;
      }
      throw new Error("Timeout");
    }

    // Initial render
    renderGallery();
  </script>
</body>
</html>
