<!DOCTYPE html>

  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }

        <i class="fa-solid fa-robot text-4xl text-cyan-400"></i>
        <h1 class="text-4xl font-bold tracking-tighter">AIWISE</h1>
      </div>
      <div class="flex gap-3">
        <button onclick="switchLang('en')" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl">EN</button>

    <!-- Target -->

      <h2 id="title" class="text-5xl font-bold mb-4">누가 가장 좋은 프롬프트를 쓸 수 있을까?</h2>
      <p id="subtitle" class="text-xl text-zinc-400 mb-8">Target 이미지와 최대한 비슷하게 만들어 보세요!</p>
      
      <div class="max-w-md mx-auto">
        <p class="text-sm uppercase tracking-widest text-cyan-400 mb-3">TARGET IMAGE</p>
        <img id="targetImage" src="https://picsum.photos/id/1015/800/800" 
             class="w-full rounded-3xl shadow-2xl border-4 border-cyan-400">
      </div>
    </div>

    <!-- Submit Form -->
    <div class="bg-zinc-900 rounded-3xl p-8 mb-12">
      <h3 id="formTitle" class="text-2xl font-semibold mb-6">프롬프트 제출하기</h3>
      
      <div class="grid md:grid-cols-2 gap-6">
        <div>
          <label id="nicknameLabel" class="block text-sm mb-2">닉네임 / 팀 이름</label>
          <input id="nickname" type="text" placeholder="eg: Minwoo" 
                 class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-lg">
        </div>
        <div>
          <label id="promptLabel" class="block text-sm mb-2">당신의 프롬프트</label>
          <textarea id="prompt" rows="5" placeholder="Your prompt here..."
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-lg resize-none"></textarea>
        </div>
      </div>

      <button onclick="generateImage()" 
              class="mt-8 w-full bg-gradient-to-r from-cyan-400 to-purple-500 text-black font-bold text-xl py-5 rounded-2xl flex items-center justify-center gap-3">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        <span id="btnText">이미지 생성 & 제출</span>
      </button>
      <p id="status" class="text-center mt-4 text-sm"></p>
    </div>

    <!-- Gallery -->
    <h3 id="galleryTitle" class="text-2xl font-semibold mb-6">실시간 갤러리 - 최고의 작품들</h3>
    <div id="gallery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
