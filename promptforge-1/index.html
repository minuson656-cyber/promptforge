<!DOCTYPE html>
<html>
<head>
    <title>NVIDIA NIM Chat</title>
</head>
<body>
    <input id="message" placeholder="메시지 입력" />
    <button onclick="sendMessage()">보내기</button>
    <div id="response"></div>

    <script>
        const API_KEY = 'your_nvidia_api_key';  // 보안 위해 백엔드 사용!
        const BASE_URL = 'https://integrate.api.nvidia.com/v1/chat/completions';

        async function sendMessage() {
            const input = document.getElementById('message').value;
            const responseDiv = document.getElementById('response');

            const payload = {
                model: 'meta/llama-3.1-8b-instruct',  // 또는 qwen/qwen3.5
                messages: [{ role: 'user', content: input }],
                temperature: 0.7,
                max_tokens: 1024,
                stream: false  // 스트리밍은 별도 처리
            };

            try {
                const res = await fetch(BASE_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                responseDiv.innerHTML = data.choices[0].message.content;
            } catch (error) {
                responseDiv.innerHTML = '오류: ' + error;
            }
        }
    </script>
</body>
</html>
